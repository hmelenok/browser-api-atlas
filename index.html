<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./atlas.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <title>Browser API Atlas — interactive web platform explorer</title>
    <meta
      name="description"
      content="An interactive graph of every web platform API. See which APIs your browser supports, try live demos, and explore the modern web platform."
    />
    <link rel="canonical" href="https://hmelenok.github.io/browser-api-atlas/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hmelenok.github.io/browser-api-atlas/" />
    <meta property="og:title" content="Browser API Atlas — interactive web platform explorer" />
    <meta
      property="og:description"
      content="An interactive graph of every web platform API. See which APIs your browser supports, try live demos, and explore the modern web platform."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Browser API Atlas" />
    <meta
      name="twitter:description"
      content="An interactive graph of every web platform API."
    />
    <meta
      property="og:image"
      content="https://hmelenok.github.io/browser-api-atlas/atlas.svg"
    />
    <meta
      name="twitter:image"
      content="https://hmelenok.github.io/browser-api-atlas/atlas.svg"
    />
    <meta name="author" content="Mykyta Khmel" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="keywords" content="browser APIs, web platform, baseline, MDN, JavaScript, interactive, web standards" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Browser API Atlas",
        "url": "https://hmelenok.github.io/browser-api-atlas/",
        "description": "An interactive graph of every web platform API. See which APIs your browser supports, try live demos, and explore the modern web platform.",
        "author": {
          "@type": "Person",
          "name": "Mykyta Khmel",
          "url": "https://github.com/hmelenok"
        }
      }
    </script>

    <!--
      ANALYTICS
      Pick one (or none). The src/lib/analytics.ts wrapper auto-detects whichever
      provider object lives on window. All options below are privacy-respecting,
      cookieless, and don't require a consent banner under GDPR/CCPA.
    -->

    <!-- 1) GoatCounter — free for personal use, no cookies, ~1KB.
         Sign up at https://www.goatcounter.com, then replace YOURCODE below. -->
    <script
      data-goatcounter="https://YOURCODE.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>

    <!-- 2) Plausible — paid hosted, free if self-hosted.
    <script
      defer
      data-domain="hmelenok.github.io/browser-api-atlas"
      src="https://plausible.io/js/script.js"
    ></script>
    -->

    <!-- 3) Umami — fully self-hostable. https://umami.is/
    <script
      defer
      src="https://YOUR-UMAMI-INSTANCE/script.js"
      data-website-id="YOUR-WEBSITE-ID"
    ></script>
    -->
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main
        style="max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; line-height: 1.6;"
      >
        <h1 style="font-size: 2rem;">Browser API Atlas</h1>
        <p style="font-size: 1.125rem;">
          An interactive graph-based explorer for every web platform API — the canonical
          surface of the modern browser, mapped, colored by your browser&rsquo;s actual
          support status, and paired with live demos.
        </p>
        <p>
          This site is a single-page application and needs JavaScript to render its graph,
          run feature detection, and execute the per-API demos. Please enable JavaScript or
          browse the source data instead:
        </p>
        <ul>
          <li><a href="https://github.com/hmelenok/browser-api-atlas">Source code on GitHub</a></li>
          <li><a href="https://github.com/mdn/browser-compat-data">MDN browser-compat-data</a> &mdash; the canonical browser support data</li>
          <li><a href="https://github.com/web-platform-dx/web-features">web-features</a> &mdash; the Baseline status data</li>
          <li><a href="https://web.dev/baseline">web.dev/baseline</a> &mdash; what &ldquo;Baseline&rdquo; classifications mean</li>
        </ul>
        <p>
          A machine-readable sitemap is available at
          <a href="./sitemap.xml">/sitemap.xml</a> listing every API page.
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
